# Install the package, run the test suite across supported Python versions.
# See: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Install (stdlib-only package + dev tools)
      run: pip install -e ".[dev]"
    - name: Skill assets are rendered (no hand-edit drift)
      run: python -m tools.skillgen --check
    - name: Test with pytest
      run: pytest -q
