# Install the package, run the test suite + the S1–S9 scenario runner across the
# supported Python versions AND all three OSes — Windows/macOS parity is a CI gate
# (macOS is field-validated; Windows is CI-tested until a manual run upgrades it,
# see docs/windows-manual-checklist.md).
# See: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # cage prints ✔/·/⚠ glyphs; Windows runners default to cp1252 consoles. The CLI
  # degrades glyphs on non-UTF consoles, but tests/the runner compare exact output —
  # run everything UTF-8 like a real modern terminal.
  PYTHONUTF8: "1"

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Install (stdlib-only package + dev tools)
      run: pip install -e ".[dev]"
    - name: Skill assets are rendered (no hand-edit drift)
      run: python -m tools.skillgen --check
    - name: Generated docs match their sources (spec ← goldens · formulas/policy comments ← explain registry)
      run: python -m tools.docgen --check
    - name: Test with pytest
      run: pytest -q
    - name: Scenario runner S1–S9 (real-CLI capture, PII, determinism, fleet)
      run: python -m tools.dummyrepo
