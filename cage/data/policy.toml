# Cage policy — the only place numbers live. Versioned, deterministic (plan §3.3).

# Prices in USD per million tokens. `cache_read` is the discounted rate the
# provider bills for prefix-cache *reads* (makes cache-alignment measurable).
# Keys are short aliases; Claude Code stamps full dated ids
# (`claude-sonnet-4-5-20250929`) which resolve to the matching family row by
# longest shared prefix (policy.price_match) — opus never borrows a sonnet price.
# Anthropic — Claude Code / Kiro (both run Claude models). Per-MTok, current rates.
[prices.anthropic."claude-opus-4-8"]
input = 5.00
output = 25.00
cache_read = 0.50

[prices.anthropic."claude-sonnet-4-6"]
input = 3.00
output = 15.00
cache_read = 0.30

[prices.anthropic."claude-haiku-4-5"]
input = 1.00
output = 5.00
cache_read = 0.10

# OpenAI — Codex CLI + Copilot (both emit gpt-5-family ids). A dotted minor like
# `gpt-5.5` is its own family (only `gpt` is shared with `gpt-5`, < 2 segments), so
# each minor needs its own row; `gpt-5-codex`/`gpt-5-mini` fall back to `gpt-5`/exact.
[prices.openai."gpt-5"]
input = 1.25
output = 10.00
cache_read = 0.125

[prices.openai."gpt-5-mini"]
input = 0.25
output = 2.00
cache_read = 0.025

[prices.openai."gpt-5.5"]
input = 5.00
output = 30.00
cache_read = 1.25

[prices.openai."gpt-5.4"]
input = 2.50
output = 15.00
cache_read = 0.625

[prices.openai."gpt-5.3-codex"]
input = 1.75
output = 14.00
cache_read = 0.175

[prices.openai."gpt-4o"]
input = 2.50
output = 10.00
cache_read = 1.25

# Kiro — its usage log stamps a generic provider/model (`kiro`/`agent`), not the real
# Claude model it runs underneath, so this is a blended *estimate* (Sonnet-tier rates).
# Override if you know Kiro's configured model; output tokens are often under-reported.
[prices.kiro."agent"]
input = 3.00
output = 15.00
cache_read = 0.30

# Auto-capture switch. Each agent's hook runs `cage import --agent <itself>` to meter
# its own on-disk usage log; set enabled=false to pause that without unwiring any hooks
# (the hooks still fire, the import is a no-op). Env CAGE_CAPTURE (0/1) overrides.
[capture]
enabled = true

# Capture-path observability (off by default, $0, metadata-only — never prompt bodies).
# When on, hooks/imports write a structured debug log + per-hook heartbeat to
# .cage/state/ so you can tell whether a hook fired, was guard-skipped, or raised. It is
# strictly observational: the ledger is byte-identical with it on or off. Env CAGE_DEBUG
# (0/1) overrides; CAGE_DEBUG_LOG sets the log path. Read it with `cage debug`.
[debug]
enabled = false

# Canonical pipeline order. Marginal attribution walks this once; each tool's
# receipt is the delta it produced *given the tools upstream of it* (plan §4.2).
[tools]
order = ["graphify", "fux", "router", "compressor", "cache", "response-cache"]

# Budget ceilings (plan §8.1). on_exceed: warn | block.
[budgets]
session_usd = 2.00
daily_usd = 25.00
on_exceed = "warn"

# Ledger-size warning (plan §3.6.4). When the partitioned shards together exceed
# warn_mb (in MB), `cage` prints ONE hint to stderr (never stdout — stdout is the
# deterministic table surface) pointing at the remedy (archive old *-YYYY-MM.jsonl
# shards / `cage ledger-sync` then prune). Warn-only, never blocks a read or write.
# Uncomment to override the derived default (constants.LEDGER_WARN_BYTES, ≈418 MB ≈
# 2 heavy solo-years); the constant is the fallback when this key is absent.
# [ledger]
# warn_mb = 418

# Cost is only honest paired with outcome (plan §8.2). `task_ok` = task succeeded
# without a human redo; cost-per-*successful*-task is the metric that matters.
[quality]
signal = "task_ok"

# Human-labor baseline (Tier-1 counterfactual, design §3.1). The only place human
# numbers live. Bundled values are illustrative blended estimates (like the model
# prices); override per-project, or inject a real rate via CAGE_HUMAN_RATE.
[human]
rate_usd_per_hr = 80        # blended default rate
default_minutes = 60        # fallback when a task has no type and no minutes
currency = "USD"

# Per-task-type lookup (mode 3 — the recommended default path). One subtable per
# type; the resolver reads minutes + rate_usd_per_hr.
[human.tasks.feature]
minutes = 120
rate_usd_per_hr = 90

[human.tasks.bugfix]
minutes = 45
rate_usd_per_hr = 80

[human.tasks.refactor]
minutes = 90
rate_usd_per_hr = 90

[human.tasks.research]
minutes = 180
rate_usd_per_hr = 70

[human.tasks.review]
minutes = 30
rate_usd_per_hr = 100

# Confidence by how the human figure was obtained (design §3 + §5b.3 ladder).
# Tunable, never hard-coded in code; every read surface shows it.
[human.confidence]
measured = 0.9      # real quote / timesheet
estimated = 0.7     # explicit usd or minutes, but a guess
diff_sized = 0.6    # type estimate scaled by diff size
type_table = 0.5    # flat task-type lookup
default = 0.3       # global fallback
