# Cage policy — the only place numbers live. Versioned, deterministic (plan §3.3).

# Bundled price-table provenance. `cage setup` copies this file verbatim, so a
# project policy carries the [meta] it derived from; `cage doctor` / `cage prices
# list` compare the two and recommend `cage prices sync` when the bundle is newer
# (never auto-applied). prices_version is the date the rows were researched.
# policy_version tracks the *non-pricing* defaults: it bumps only when a release
# adds/changes/removes a bundled tunable, and `cage policy sync` compares it.
[meta]
prices_version = "2026-07-14"
prices_date = "2026-07-14"
cage_version = "0.25.0"
policy_version = "0.26.0"

# Prices in USD per million tokens. `cache_read` is the discounted rate the
# provider bills for prefix-cache *reads* (makes cache-alignment measurable).
# Keys are short aliases; Claude Code stamps full dated ids
# (`claude-sonnet-4-5-20250929`) which resolve to the matching family row by
# longest shared prefix over normalized ids (policy.price_match: known router
# prefixes strip, `.` folds to `-`, trailing effort tiers low/medium/high/max
# drop — both vendors bill every effort tier at the same per-token rate, verified
# 2026-07-11) — opus never borrows a sonnet price, and a normalized match always
# renders `family`, never `exact`. Update workflow: `cage prices unpriced` lists
# what's billing $0 with a ready-to-run fix line; cage itself never fetches a
# price (no network on any cage code path) — check the vendor's pricing page.

# Anthropic — Claude Code / Kiro (both run Claude models), and Copilot-served
# Claude (see the GitHub Copilot note below). Per-MTok list rates.
# source: https://platform.claude.com/docs/en/about-claude/pricing (retrieved 2026-07-14)
# Cache reads bill at 0.1× input across the current lineup.
# Fable 5 / Mythos 5 are the most-capable tier — priced above Opus. `claude-fable-5`
# shares only `claude` with the opus/sonnet/haiku rows (< 2 segments), so it needs its
# own exact row or it prices at $0; Mythos 5 has identical pricing.
[prices.anthropic."claude-fable-5"]
input = 10.00
output = 50.00
cache_read = 1.00

[prices.anthropic."claude-mythos-5"]
input = 10.00
output = 50.00
cache_read = 1.00

