<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cage app tile">
  <title>Cage — app tile</title>
  <defs>
    <linearGradient id="cage-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9DECFF"/>
      <stop offset="55%" stop-color="#2FC4E8"/>
      <stop offset="100%" stop-color="#1186AE"/>
    </linearGradient>
    <linearGradient id="tile-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16140f"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </linearGradient>
    <radialGradient id="tile-glow" cx="50%" cy="18%" r="75%">
      <stop offset="0%" stop-color="#2fc4e8" stop-opacity=".15"/>
      <stop offset="60%" stop-color="#2fc4e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tile-sheen" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".06"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="tile-clip"><rect width="120" height="120" rx="28"/></clipPath>
  </defs>

  <g clip-path="url(#tile-clip)">
    <rect width="120" height="120" fill="url(#tile-base)"/>
    <rect width="120" height="120" fill="url(#tile-glow)"/>
    <rect width="120" height="120" fill="url(#tile-sheen)"/>
  </g>
  <rect x=".5" y=".5" width="119" height="119" rx="28" fill="none" stroke="#ffffff" stroke-opacity=".08"/>

  <!-- mark, 78px, centered (78/64 = 1.219; center at 60,60) -->
  <g transform="translate(60,60) scale(1.219) translate(-32,-32)">
    <rect x="9" y="50" width="46" height="2.6" rx="1.3" fill="#000" opacity=".22"/>
    <rect x="14" y="15" width="14" height="35" rx="2" fill="url(#cage-grad)"/>
    <rect x="33" y="37" width="14" height="13" rx="2" fill="url(#cage-grad)"/>
    <rect x="14" y="15" width="2.6" height="35" rx="1.3" fill="#fff" opacity=".2"/>
    <rect x="33" y="37" width="2.4" height="13" rx="1.2" fill="#fff" opacity=".16"/>
    <path d="M50 15 h3 v22 h-3" fill="none" stroke="#fff" stroke-width="2.2" opacity=".5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
