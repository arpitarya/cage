<svg width="120" height="120" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cage symbol">
  <title>Cage — value ledger</title>
  <defs>
    <linearGradient id="cage-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9DECFF"/>
      <stop offset="55%" stop-color="#2FC4E8"/>
      <stop offset="100%" stop-color="#1186AE"/>
    </linearGradient>
  </defs>
  <!-- two costs side by side: a tall human cost, a short tool cost, and the bracketed gap you saved -->
  <g>
    <rect x="9" y="50" width="46" height="2.6" rx="1.3" fill="#000" opacity=".22"/>
    <rect x="14" y="15" width="14" height="35" rx="2" fill="url(#cage-grad)"/>
    <rect x="33" y="37" width="14" height="13" rx="2" fill="url(#cage-grad)"/>
    <rect x="14" y="15" width="2.6" height="35" rx="1.3" fill="#fff" opacity=".2"/>
    <rect x="33" y="37" width="2.4" height="13" rx="1.2" fill="#fff" opacity=".16"/>
    <path d="M50 15 h3 v22 h-3" fill="none" stroke="#fff" stroke-width="2.2" opacity=".5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
