<svg viewBox="0 0 1180 640" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Cage architecture</title>
  <desc>Left to right flow: agent sources feed capture paths into the append-only ledger; policy and constants join the ledger in the deterministic derive engine, which renders read surfaces and exports. A dashed arrow returns from MCP to the agents.</desc>

  <style>
    svg {
      --surface-0: #ffffff;
      --surface-1: #f6f8fa;
      --surface-2: #eef1f4;
      --border: #d0d7de;
      --border-strong: #a8b1bb;
      --border-stronger: #6e7781;
      --text-primary: #1f2328;
      --text-secondary: #424a53;
      --text-muted: #656d76;
      --text-accent: #0969da;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-family: var(--font-sans);
    }
    @media (prefers-color-scheme: dark) {
      svg {
        --surface-0: #0d1117;
        --surface-1: #161b22;
        --surface-2: #1c2129;
        --border: #30363d;
        --border-strong: #484f58;
        --border-stronger: #8b949e;
        --text-primary: #e6edf3;
        --text-secondary: #c9d1d9;
        --text-muted: #8b949e;
        --text-accent: #58a6ff;
      }
    }
  </style>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--text-muted)"/>
    </marker>
  </defs>

  <!-- ===== Column headers ===== -->
  <text x="115" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-secondary)" letter-spacing="1">SOURCES</text>
  <text x="330" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-secondary)" letter-spacing="1">CAPTURE</text>
  <text x="565" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-secondary)" letter-spacing="1">SUBSTRATE</text>
  <text x="810" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-secondary)" letter-spacing="1">DERIVE&#160;&#160;$0 · deterministic</text>
  <text x="1055" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text-secondary)" letter-spacing="1">READ / EXPORT</text>

  <!-- ===== Col 1: Sources ===== -->
  <g>
    <rect x="25" y="45" width="180" height="150" rx="10" fill="var(--surface-1)" stroke="var(--border)"/>
    <text x="115" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="var(--text-primary)">Four agents</text>
    <text x="115" y="82" text-anchor="middle" font-size="10" fill="var(--text-muted)">CLI + VS Code extension</text>
    <g font-size="11.5" fill="var(--text-secondary)">
      <text x="45" y="106">Claude Code</text>
      <text x="45" y="126">Codex</text>
      <text x="45" y="146">Copilot</text>
      <text x="45" y="166">Kiro IDE</text>
    </g>
    <g fill="var(--text-muted)" font-size="9">
      <text x="160" y="106">hooks+log</text>
      <text x="160" y="126">rollouts</text>
      <text x="160" y="146">events</text>
      <text x="160" y="166">token log</text>
    </g>

    <rect x="25" y="215" width="180" height="46" rx="10" fill="var(--surface-1)" stroke="var(--border)"/>
    <text x="115" y="234" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">Your code / Orff</text>
    <text x="115" y="250" text-anchor="middle" font-size="10" fill="var(--text-muted)" font-family="var(--font-mono)">cage.meter() · proxy</text>

    <rect x="25" y="281" width="180" height="46" rx="10" fill="var(--surface-1)" stroke="var(--border)"/>
    <text x="115" y="300" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">Tools</text>
    <text x="115" y="316" text-anchor="middle" font-size="10" fill="var(--text-muted)">graphify / fux receipts</text>
  </g>

  <!-- ===== Col 2: Capture ===== -->
  <g>
    <rect x="250" y="45" width="160" height="64" rx="10" fill="var(--surface-1)" stroke="var(--border)"/>
    <text x="330" y="66" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">Hooks</text>
    <text x="330" y="82" text-anchor="middle" font-size="10" fill="var(--text-muted)">real-time · CLI only</text>
    <text x="330" y="96" text-anchor="middle" font-size="10" fill="var(--text-muted)">optional add-on</text>

    <rect x="250" y="129" width="160" height="64" rx="10" fill="var(--surface-2)" stroke="var(--border-strong)"/>
    <text x="330" y="150" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">cage import</text>
    <text x="330" y="166" text-anchor="middle" font-size="10" fill="var(--text-muted)">universal pull · dedupe</text>
    <text x="330" y="180" text-anchor="middle" font-size="10" fill="var(--text-muted)">works everywhere</text>

    <rect x="250" y="213" width="160" height="50" rx="10" fill="var(--surface-1)" stroke="var(--border)"/>
    <text x="330" y="233" text-anchor="middle" font-size="12" font-weight="600" fill="var(--text-primary)">cage-run shim</text>
    <text x="330" y="249" text-anchor="middle" font-size="10" fill="var(--text-muted)">portable wiring · fail-open</text>

    <text x="330" y="290" text-anchor="middle" font-size="10" fill="var(--text-muted)" font-style="italic">write path: fail-open,</text>
    <text x="330" y="304" text-anchor="middle" font-size="10" fill="var(--text-muted)" font-style="italic">never raises into a turn</text>
  </g>

  <!-- ===== Col 3: Substrate ===== -->
  <g>
    <rect x="455" y="45" width="220" height="180" rx="10" fill="var(--surface-2)" stroke="var(--border-stronger)" stroke-width="1.5"/>
    <text x="565" y="68" text-anchor="middle" font-size="13.5" font-weight="700" fill="var(--text-accent)">.cage/ledger</text>
    <text x="565" y="84" text-anchor="middle" font-size="10" fill="var(--text-muted)">append-only · month shards</text>
    <g font-size="11" fill="var(--text-secondary)" font-family="var(--font-mono)">
      <text x="475" y="108">calls-YYYY-MM.jsonl</text>
      <text x="475" y="126">receipts-YYYY-MM.jsonl</text>
      <text x="475" y="144">tasks-YYYY-MM.jsonl</text>
      <text x="475" y="162">provenance.jsonl</text>
    </g>
    <text x="565" y="188" text-anchor="middle" font-size="10" fill="var(--text-muted)">token counts, never content</text>
    <text x="565" y="203" text-anchor="middle" font-size="10" fill="var(--text-muted)">ids carry the only entropy</text>

    <rect x="455" y="245" width="220" height="44" rx="10" fill="var(--surface-1)" stroke="var(--border)"/>
    <text x="565" y="263" text-anchor="middle" font-size="12" font-weight="600" fill="var(--text-primary)">state/</text>
    <text x="565" y="279" text-anchor="middle" font-size="10" fill="var(--text-muted)">cursors · limits · machine id</text>

    <rect x="455" y="309" width="220" height="64" rx="10" fill="var(--surface-1)" stroke="var(--border)"/>
    <text x="565" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="var(--text-primary)">policy.toml + constants.py</text>
    <text x="565" y="344" text-anchor="middle" font-size="10" fill="var(--text-muted)">prices · budgets · human rates</text>
    <text x="565" y="358" text-anchor="middle" font-size="10" fill="var(--text-muted)">reviewable heuristics</text>
  </g>

  <!-- ===== Col 4: Derive ===== -->
  <g>
    <rect x="720" y="45" width="180" height="328" rx="10" fill="var(--surface-0)" stroke="var(--border-strong)"/>
    <g font-size="11.5">
      <text x="740" y="72" font-weight="600" fill="var(--text-primary)">Spend</text>
      <text x="740" y="88" fill="var(--text-muted)" font-size="10">report · budget · roi · forecast</text>
      <text x="740" y="114" font-weight="600" fill="var(--text-primary)">Attribution</text>
      <text x="740" y="130" fill="var(--text-muted)" font-size="10">attrib · matrix (counterfactual)</text>
      <text x="740" y="156" font-weight="600" fill="var(--text-primary)">Cost impact</text>
      <text x="740" y="172" fill="var(--text-muted)" font-size="10">compare · estimate · verdict</text>
      <text x="740" y="198" font-weight="600" fill="var(--text-primary)">Human axis</text>
      <text x="740" y="214" fill="var(--text-muted)" font-size="10">human · trend · attention</text>
      <text x="740" y="240" font-weight="600" fill="var(--text-primary)">Fleet</text>
      <text x="740" y="256" fill="var(--text-muted)" font-size="10">study · coverage · paired Δ</text>
      <text x="740" y="282" font-weight="600" fill="var(--text-primary)">Authorship</text>
      <text x="740" y="298" fill="var(--text-muted)" font-size="10">origin · verify</text>
      <text x="740" y="324" font-weight="600" fill="var(--text-primary)">Self-explain</text>
      <text x="740" y="340" fill="var(--text-muted)" font-size="10">query · doctor · --paths</text>
    </g>
    <text x="810" y="363" text-anchor="middle" font-size="9.5" fill="var(--text-muted)" font-style="italic">no LLM · no network · no clock</text>
  </g>

  <!-- ===== Col 5: Read/Export ===== -->
  <g>
    <rect x="945" y="45" width="200" height="58" rx="10" fill="var(--surface-1)" stroke="var(--border)"/>
    <text x="1045" y="66" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">MCP server</text>
    <text x="1045" y="82" text-anchor="middle" font-size="10" fill="var(--text-muted)">every agent reads back</text>
    <text x="1045" y="95" text-anchor="middle" font-size="10" fill="var(--text-muted)">+ rendered skills</text>

    <rect x="945" y="123" width="200" height="50" rx="10" fill="var(--surface-1)" stroke="var(--border)"/>
    <text x="1045" y="143" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">Terminal · CSV · JSON</text>
    <text x="1045" y="159" text-anchor="middle" font-size="10" fill="var(--text-muted)">method tags survive export</text>

    <rect x="945" y="193" width="200" height="50" rx="10" fill="var(--surface-1)" stroke="var(--border)"/>
    <text x="1045" y="213" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">Fleet bundles</text>
    <text x="1045" y="229" text-anchor="middle" font-size="10" fill="var(--text-muted)">export → analyst → import</text>

    <rect x="945" y="263" width="200" height="50" rx="10" fill="var(--surface-1)" stroke="var(--border)"/>
    <text x="1045" y="283" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">git refs/notes</text>
    <text x="1045" y="299" text-anchor="middle" font-size="10" fill="var(--text-muted)">team ledger · CI sole writer</text>
  </g>

  <!-- ===== Arrows ===== -->
  <g stroke="var(--text-muted)" stroke-width="1.4" fill="none" marker-end="url(#arr)">
    <path d="M205 90 L246 77"/>
    <path d="M205 130 L246 155"/>
    <path d="M205 238 C230 238 235 175 246 166"/>
    <path d="M205 304 C235 304 240 190 246 176"/>
    <path d="M410 77 C435 77 440 100 451 108"/>
    <path d="M410 161 L451 148"/>
    <path d="M675 135 L716 150"/>
    <path d="M675 341 C700 341 705 300 716 290"/>
    <path d="M900 80 L941 74"/>
    <path d="M900 150 L941 148"/>
    <path d="M900 230 L941 218"/>
    <path d="M900 290 L941 288"/>
  </g>
  <path d="M1045 41 C1045 6 200 2 132 41" stroke="var(--text-muted)" stroke-width="1.2" stroke-dasharray="5 4" fill="none" marker-end="url(#arr)"/>
  <text x="590" y="14" text-anchor="middle" font-size="10" fill="var(--text-muted)" font-style="italic">agents ask cage about their own spend (MCP / skill)</text>

  <text x="228" y="120" text-anchor="middle" font-size="9.5" fill="var(--text-muted)">logs</text>
  <text x="430" y="120" text-anchor="middle" font-size="9.5" fill="var(--text-muted)">append</text>
  <text x="697" y="128" text-anchor="middle" font-size="9.5" fill="var(--text-muted)">read</text>
  <text x="920" y="115" text-anchor="middle" font-size="9.5" fill="var(--text-muted)">render</text>

  <!-- ===== Laws footer ===== -->
  <rect x="25" y="400" width="1120" height="52" rx="10" fill="var(--surface-1)" stroke="var(--border)"/>
  <text x="45" y="421" font-size="11" font-weight="700" fill="var(--text-secondary)" letter-spacing="1">LAWS</text>
  <g font-size="11" fill="var(--text-secondary)">
    <text x="45" y="440">$0 stdlib-only</text>
    <text x="160" y="440">append-only ledger</text>
    <text x="310" y="440">deterministic derives</text>
    <text x="470" y="440">fail-open writes / typed reads</text>
    <text x="680" y="440">counts, never content (PII)</text>
    <text x="880" y="440">method is sacred</text>
    <text x="1015" y="440">four agents, always</text>
  </g>

  <!-- ===== Lifecycle strip ===== -->
  <g font-size="10.5" fill="var(--text-muted)">
    <text x="45" y="486" font-weight="700" fill="var(--text-secondary)" font-size="11" letter-spacing="1">ONE ROW'S LIFE</text>
    <text x="45" y="510" font-family="var(--font-mono)" fill="var(--text-secondary)">agent turn → session log → import (composite id, dedupe) → calls-2026-07.jsonl → repriced at read time → report/verdict → CSV for the analyst</text>
    <text x="45" y="540" font-weight="700" fill="var(--text-secondary)" font-size="11" letter-spacing="1">METHOD LADDER</text>
    <text x="45" y="564" font-family="var(--font-mono)" fill="var(--text-secondary)">measured (recorded run) &gt; estimated (observed Δ, human time) &gt; modeled (counterfactual, forecast) — a projection never reads as measured</text>
    <text x="45" y="594" font-weight="700" fill="var(--text-secondary)" font-size="11" letter-spacing="1">DISTRIBUTION</text>
    <text x="45" y="618" font-family="var(--font-mono)" fill="var(--text-secondary)">pip cage.exe · pipx · py -m cage · cage.pyz (zipapp, restricted endpoints) — same ledger contract everywhere</text>
  </g>
</svg>
